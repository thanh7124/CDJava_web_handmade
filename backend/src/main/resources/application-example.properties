# Application Configuration Example
# Copy this file to application.properties and update the values

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/handmade_db
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=your_jwt_secret_key_here
jwt.expiration=86400000

# Giao Hang Nhanh
ghn.api.base-url=${GHN_API_BASE_URL:https://online-gateway.ghn.vn/shiip/public-api}
ghn.api.token=${0e4a6ccc-409c-11f0-befe-e619a81f0f8e}
