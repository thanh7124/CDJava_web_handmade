# Application Configuration Example
# Copy this file to application.properties and update the values

# Server
server.port=8080
server.servlet.context-path=

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/handmade_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Application Name
spring.application.name=handmade-ecommerce

# JWT
jwt.secret=your_jwt_secret_key_here
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:5173

# Upload
app.upload.avatar-dir=uploads/avatars
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Giao Hang Nhanh
ghn.api.base-url=${GHN_API_BASE_URL:https://online-gateway.ghn.vn/shiip/public-api}
ghn.api.token=${GHN_API_TOKEN:}
ghn.shop-id=${GHN_SHOP_ID:}