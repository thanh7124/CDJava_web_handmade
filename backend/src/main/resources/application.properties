# Server Configuration
server.port=8080
server.servlet.context-path=

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/handmade_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Application Name
spring.application.name=handmade-ecommerce

# JWT Configuration
jwt.secret=your_secret_key_here_make_it_long_and_random
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:5173

# Avatar/Product upload
app.upload.avatar-dir=uploads/avatars
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

